# Codex CLI configuration — MEMEMADE_ROOT origin

# --- Sandbox / Approval policy ---
# 일반 운영 환경에 맞춰 workspace-write + on-request 조합 사용.
# - workspace-write: 워크스페이스 내 파일 편집/쉘 실행 허용, 외부 네트워크/시스템 쓰기 차단
# - on-request: 모델이 필요하다고 판단할 때만 승인 요청
# NOTE: TOML 규약상 최상위 키는 반드시 [section] 헤더보다 앞에 와야 함.
# DevContainer 환경에서는 codex exec 시 --dangerously-bypass-approvals-and-sandbox 권장
# (bubblewrap 비호환 — 컨테이너 자체가 격리이므로 우회 합리적).
sandbox_mode = "workspace-write"
ask_for_approval = "on-request"

[features]
codex_hooks = true

# --- MCP servers ---
# Context7(문서)·Serena(코드 인텔리전스) MCP는 DevContainer 레벨에서 관리됨.
# 프로젝트 레벨에서 추가 MCP 서버가 필요하면 아래 예시를 참고하여 등록:
#
# [mcp_servers.context7]
# command = "npx"
# args = ["-y", "@upstash/context7-mcp"]
#
# [mcp_servers.serena]
# command = "uvx"
# args = ["--from", "git+https://github.com/oraios/serena", "serena-mcp-server"]
