# =============================================================================
# projects/b — Level-3b Sub-project DevContainer
# =============================================================================
# Independent container.  ROOT observes this via `docker exec claude-meta-autoagent-b`.
# Ports offset from ROOT (5xxx vs 3xxx) and from projects/a (4xxx) to avoid
# collision when all three run at once.
#
# Mount scope: the bind-mount below resolves to projects/b/ on the host —
# this sub-project has no visibility into ROOT-only materials under
# docs/research/ or scripts/meta/.
# =============================================================================

services:
  claude-devcontainer:
    container_name: ${CONTAINER_NAME:-claude-meta-autoagent-b}
    image: ${IMAGE_NAME:-claude-devcontainer-b}:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - PROJECT_NODE_VERSION=${PROJECT_NODE_VERSION:-}

    volumes:
      - ${HOST_WORKSPACE_PATH:-..}:/workspaces:cached
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistence — single source for BOTH entry paths.
      # devcontainer.json does not re-declare these, so plain `docker compose up`
      # and VS Code "Reopen in Container" share the same COMPOSE_PROJECT_NAME-scoped
      # volumes and preserve auth tokens + history identically across rebuild.
      - claude-config:/home/vscode/.claude
      - codex-config:/home/vscode/.codex
      - command-history:/commandhistory

    ports:
      - "${PORT_APP:-5000}:3000"
      - "${PORT_API:-5080}:8080"

    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1

    environment:
      - TZ=${TZ:-UTC}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}

    stdin_open: true
    tty: true

    healthcheck:
      test: ["CMD-SHELL", "claude --version >/dev/null 2>&1 && SKIP_CODEX_UPDATE=1 codex --version >/dev/null 2>&1 && { test -d /workspaces/.git || test -f /workspaces/AGENTS.md || test -f /workspaces/CLAUDE.md || test -f /workspaces/README.md || test -d /workspaces/.devcontainer; }"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# Named volumes (declared at the project level; created with the
# COMPOSE_PROJECT_NAME prefix). These are the single persistence source for
# both entry paths — change COMPOSE_PROJECT_NAME in .env to isolate instances.
volumes:
  claude-config:
  codex-config:
  command-history:
